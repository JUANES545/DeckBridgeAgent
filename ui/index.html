<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeckBridge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --bg-window:   #0d1117;
      --bg-card:     #161b27;
        --border:      rgba(255,255,255,0.06);
      --accent:      #3b82f6;
      --text:        #f1f5f9;
      --text-muted:  #64748b;
      --radius-card: 12px;
      --radius-btn:  8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      user-select: none;
      background: var(--bg-window);
      color: var(--text);
      font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    /* Two-column body — fills all available viewport height */
    #body-cols {
      display: flex;
      flex-direction: row;
      height: 100%;
      overflow: hidden;
    }

    /* Drag handle for frameless window (pywebview on Windows).
       A thin invisible strip at the top-left lets the user drag the window.
       macOS NSWindow is draggable natively — this is a no-op there. */
    #drag-handle {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 8px;
      -webkit-app-region: drag;
      z-index: 9999;
      pointer-events: none;  /* clicks pass through */
    }

    #col-left {
      width: 260px;
      flex-shrink: 0;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    #col-right {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius-card);
      border: 1px solid var(--border);
    }

    /* Status dot */
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 9999px;
      flex-shrink: 0;
      transition: background 0.4s, box-shadow 0.4s;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.3s;
      white-space: nowrap;
    }

    /* Buttons */
    .btn {
      border-radius: var(--radius-btn);
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      -webkit-app-region: no-drag;
      border: none;
      outline: none;
    }
    .btn:active { opacity: 0.65; }

    .btn-outlined {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 0 14px;
    }
    .btn-outlined:hover { background: rgba(255,255,255,0.05); }

    .btn-danger-ghost {
      border: 1px solid rgba(248,113,113,0.25);
      background: transparent;
      color: #f87171;
      width: 100%;
      padding: 0 14px;
    }
    .btn-danger-ghost:hover { background: rgba(248,113,113,0.06); }

    /* Log list */
    .log-list {
      overflow-y: auto;
      scrollbar-width: none;
    }
    .log-list::-webkit-scrollbar { display: none; }

    .log-row {
      display: grid;
      grid-template-columns: 14px 68px 58px 1fr;
      gap: 4px;
      align-items: center;
      padding: 4px 12px;
      font-family: "SF Mono", "Menlo", "Monaco", monospace;
      font-size: 11px;
      color: var(--text-muted);
      transition: opacity 0.2s;
    }
    .log-row:nth-child(even) { background: rgba(255,255,255,0.02); }
    .log-row:nth-child(odd)  { background: transparent; }
    .log-ok   { color: #4ade80; }
    .log-fail { color: #f87171; }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 2px 6px 2px;
    }

    /* Close button */
    #close-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-app-region: no-drag;
      line-height: 1;
    }
    #close-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* Accessibility warning banner */
    .a11y-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 8px;
      background: rgba(234,179,8,0.08);
      border: 1px solid rgba(234,179,8,0.18);
      color: #fbbf24;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-app-region: no-drag;
    }
    .a11y-banner:hover { background: rgba(234,179,8,0.13); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 38px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(59,130,246,0.92);
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 16px;
      border-radius: 20px;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
      white-space: nowrap;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }
    .dot-pulse { animation: pulse-dot 1.4s ease-in-out infinite; }
  </style>
</head>
<body x-data="deckbridge()" x-init="init()">
  <!-- Invisible drag strip for frameless pywebview window on Windows -->
  <div id="drag-handle"></div>

  <!-- Body: two-column horizontal layout (native NSWindow title bar shown above on Mac) -->
  <div id="body-cols">

    <!-- LEFT COLUMN -->
    <div id="col-left">

      <!-- Status card -->
      <div class="card" style="padding:14px 16px; display:flex; flex-direction:column; gap:8px;">
        <!-- Row 1: dot + name + badge -->
        <div style="display:flex; align-items:center; gap:10px;">
          <div
            class="status-dot"
            :class="state === 'waiting_for_pairing' ? 'dot-pulse' : ''"
            :style="dotStyle()"
          ></div>
          <span
            style="font-size:13px; font-weight:500; color:#f1f5f9; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
            x-text="device_name || 'Sin dispositivo'"
          ></span>
          <span
            class="status-badge"
            :class="statusBadgeClass()"
            x-text="statusText()"
          ></span>
        </div>
        <!-- Row 2: IP + port -->
        <div style="display:flex; align-items:center; padding-left:22px;">
          <span style="font-size:11px; color:var(--text-muted);">
            <span x-text="lan_ip"></span>
            <span style="margin:0 4px; opacity:0.4;">&middot;</span>
            :<span x-text="port"></span>
          </span>
        </div>
        <!-- Row 3: last action (conditional) -->
        <div
          x-show="last_action_ago !== null"
          style="padding-left:22px;"
          x-transition:enter="transition ease-out duration-200"
          x-transition:enter-start="opacity-0"
          x-transition:enter-end="opacity-100"
        >
          <span style="font-size:11px; color:var(--text-muted);">
            Ultima acci&oacute;n: <span x-text="last_action_ago" style="color:#94a3b8;"></span>
          </span>
        </div>
      </div>

      <!-- Action buttons row: Parear + Copiar QR -->
      <div style="display:flex; gap:8px;">
        <button class="btn btn-outlined" style="flex:1;" @click="pair()">
          Parear
        </button>
        <button class="btn btn-outlined" style="flex:1;" @click="copyQr()">
          Copiar QR
        </button>
      </div>

      <!-- Forget button (conditional, full width) -->
      <div x-show="state === 'connected' || state === 'paired'" x-transition>
        <button class="btn btn-danger-ghost" @click="forget()">
          Olvidar dispositivo
        </button>
      </div>

      <!-- Spacer -->
      <div style="flex:1;"></div>

      <!-- Accessibility warning banner (compact) -->
      <div
        x-show="!accessibility_ok"
        class="a11y-banner"
        style="font-size:10px; padding:5px 10px;"
        @click="openAccessibilitySettings()"
        x-transition
      >
        <span>&#x26A0;</span>
        <span>Accesibilidad no concedida &mdash; macros no activas</span>
      </div>

      <!-- Update available banner -->
      <div
        x-show="update_available && update_version"
        style="display:flex; align-items:center; justify-content:space-between; gap:6px; padding:7px 12px; border-radius:8px; background:rgba(59,130,246,0.10); border:1px solid rgba(59,130,246,0.25); font-size:11px; cursor:pointer; -webkit-app-region:no-drag;"
        @click="update_url && window.open(update_url, '_blank')"
        x-transition
      >
        <span style="color:#93c5fd;">Nueva version: <strong x-text="'v' + update_version" style="color:#60a5fa;"></strong></span>
        <span style="color:#60a5fa; font-size:10px; opacity:0.8;">Actualizar &rarr;</span>
      </div>

      <!-- Footer line -->
      <div style="border-top:1px solid var(--border); padding-top:7px; font-size:11px; color:var(--text-muted);">
        v<span x-text="version"></span>
        <span style="margin:0 5px; opacity:0.35;">&middot;</span>
        AX&nbsp;<span
          :style="accessibility_ok ? 'color:#4ade80' : 'color:#f87171; cursor:pointer; text-decoration:underline;'"
          x-text="accessibility_ok ? '&#10003;' : '&#10007;'"
          @click="!accessibility_ok && openAccessibilitySettings()"
        ></span>
        <span style="margin:0 5px; opacity:0.35;">&middot;</span>
        UDP&nbsp;<span
          :style="udp_ok ? 'color:#4ade80' : 'color:#f87171'"
          x-text="udp_ok ? '&#10003;' : '&#10007;'"
        ></span>
      </div>

    </div><!-- /col-left -->

    <!-- RIGHT COLUMN -->
    <div id="col-right">

      <div class="section-label">Acciones recientes</div>

      <div class="card log-list" style="flex:1; min-height:0;">
        <template x-if="last_actions.length === 0">
          <div style="display:flex; align-items:center; justify-content:center; height:100%; min-height:72px;">
            <span style="font-size:12px; color:var(--text-muted); font-style:italic;">Sin acciones a&uacute;n</span>
          </div>
        </template>
        <template x-for="(a, i) in last_actions.slice(0, 8)" :key="i">
          <div class="log-row">
            <span :class="a.ok ? 'log-ok' : 'log-fail'" x-text="a.ok ? '&#10003;' : '&#10007;'"></span>
            <span x-text="a.time"></span>
            <span x-text="a.type"></span>
            <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" x-text="a.detail"></span>
          </div>
        </template>
      </div>

    </div><!-- /col-right -->

  </div><!-- /body-cols -->

  <!-- Toast notification -->
  <div id="toast" x-ref="toast" style="opacity:0;">Copiado!</div>

  <script>
    function deckbridge() {
      return {
        state: 'idle',
        device_name: null,
        lan_ip: '\u2014',
        port: 8765,
        last_action_ago: null,
        last_actions: [],
        version: '\u2014',
        accessibility_ok: true,
        udp_ok: true,
        loading: true,
        update_available: false,
        update_version: null,
        update_url: null,

        init() {
          setInterval(() => this.poll(), 1000);
          this.poll();
        },

        async poll() {
          try {
            const resp = await fetch('/api/status');
            const s = await resp.json();
            if (s) {
              this.state            = s.state            ?? this.state;
              this.device_name      = s.device_name      ?? null;
              this.lan_ip           = s.lan_ip            || '\u2014';
              this.port             = s.port              ?? 8765;
              this.last_action_ago  = s.last_action_ago   ?? null;
              this.last_actions     = s.last_actions      ?? [];
              this.version          = s.version           || '\u2014';
              this.accessibility_ok = s.accessibility_ok  !== false;
              this.udp_ok           = s.udp_ok            !== false;
              if (s.update) {
                this.update_available = s.update.update_available === true;
                this.update_version   = s.update.latest_version   ?? null;
                this.update_url       = s.update.download_url     ?? null;
              }
              this.loading          = false;
            }
          } catch (e) {
            // agent may be restarting
          }
        },

        dotStyle() {
          const colors = {
            connected:           'background:#4ade80; box-shadow:0 0 10px #4ade8099',
            paired:              'background:#facc15; box-shadow:0 0 8px #facc1566',
            waiting_for_pairing: 'background:#60a5fa; box-shadow:0 0 8px #60a5fa66',
            idle:                'background:#475569',
            error:               'background:#f87171; box-shadow:0 0 8px #f8717166',
          };
          return colors[this.state] || colors.idle;
        },

        statusBadgeClass() {
          const cls = {
            connected:           'bg-green-500/20 text-green-400',
            paired:              'bg-yellow-500/20 text-yellow-400',
            waiting_for_pairing: 'bg-blue-500/20 text-blue-400 animate-pulse',
            idle:                'bg-slate-700 text-slate-400',
            error:               'bg-red-500/20 text-red-400',
          };
          return cls[this.state] || cls.idle;
        },

        statusText() {
          const labels = {
            connected:           'Conectado',
            paired:              'Pareado',
            waiting_for_pairing: 'Pareando\u2026',
            idle:                'Sin dispositivo',
            error:               'Error',
          };
          return labels[this.state] || this.state;
        },

        statusColor() {
          const colors = {
            connected:           'color:#4ade80',
            paired:              'color:#facc15',
            waiting_for_pairing: 'color:#60a5fa',
            idle:                'color:#64748b',
            error:               'color:#f87171',
          };
          return colors[this.state] || 'color:#64748b';
        },

        async pair() {
          try { await fetch('/api/pair', {method:'POST'}); } catch(e) {}
        },

        async copyQr() {
          try {
            const resp = await fetch('/api/status');
            const s = await resp.json();
            const link = `deckbridge://pair?h=${s.lan_ip}&p=${s.port}&v=1`;
            await navigator.clipboard.writeText(link);
            this.showToast('\u00a1Copiado!');
          } catch(e) {}
        },

        async forget() {
          if (!confirm('Olvidar el dispositivo pareado? Tendra que volver a parear desde el telefono.')) return;
          try { await fetch('/api/forget', {method:'POST'}); } catch(e) {}
        },

        closeWindow() {
          window.close();
        },

        openAccessibilitySettings() {
          // Guide user — can't open System Settings from browser
          alert('Ve a: Configuraci\u00f3n del Sistema \u2192 Privacidad y Seguridad \u2192 Accesibilidad \u2192 agrega DeckBridge');
        },

        showToast(msg) {
          const el = this.$refs.toast;
          el.textContent = msg;
          el.style.opacity = '1';
          setTimeout(() => { el.style.opacity = '0'; }, 2000);
        },
      };
    }
  </script>
</body>
</html>
